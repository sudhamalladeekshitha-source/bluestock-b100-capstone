{% extends 'base.html' %}
{% block content %}
<h2 class="fw-bold mb-4">🏭 Sector Analysis</h2>
<div class="row">
    {% for sector in sectors %}
    <div class="col-md-4 mb-3">
        <div class="card p-3">
            <h5 class="fw-bold">{{ sector.sector }}</h5>
            <p class="text-muted mb-1">
                Companies: <strong>{{ sector.company_count }}</strong>
            </p>
            <p class="text-muted mb-1">
                Avg OPM%:
                <strong>{{ sector.avg_opm|floatformat:1 }}%</strong>
            </p>
            <p class="text-muted mb-1">
                Avg Health:
                <strong>{{ sector.avg_health|floatformat:1 }}</strong>
            </p>
            <a href="/companies/?sector={{ sector.sector }}"
               class="btn btn-sm btn-outline-primary mt-2">
                View Companies
            </a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
