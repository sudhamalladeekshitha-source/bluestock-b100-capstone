<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluestock — Nifty 100 Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f8f9fa; }
        .navbar { background: #1a237e !important; }
        .card { border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .health-excellent { color: #00B050; font-weight: bold; }
        .health-good { color: #92D050; font-weight: bold; }
        .health-average { color: #FFC000; font-weight: bold; }
        .health-weak { color: #FF6600; font-weight: bold; }
        .health-poor { color: #FF0000; font-weight: bold; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🔵 Bluestock</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="/">Home</a>
            <a class="nav-link text-white" href="/companies/">Companies</a>
            <a class="nav-link text-white" href="/sectors/">Sectors</a>
            <a class="nav-link text-white" href="/api/market-overview/">API</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
